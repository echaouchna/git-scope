# Git-Scope Configuration
# Copy this file to ~/.config/git-scope/config.yml

# Root directories to scan for git repositories
roots:
  - ~/code
  - ~/projects

# Directories to ignore during scanning.
# Rules:
# - node_modules or exact:node_modules  => exact directory-name match (default)
# - glob:*.cache                        => directory-name glob match
# - path:vendor/github.com              => root-relative path/subtree match
# - regex:^tmp-   or /^tmp-/            => regex match (name or relative path)
ignore:
  - node_modules
  - glob:*.cache
  - path:vendor/github.com
  - regex:^tmp-
  - .next
  - dist
  - build
  - target
  - .venv
  - vendor
  - .terraform

# Editor to open repos in (default: code)
# Options: code, idea, nvim, vim, etc.
editor: code
