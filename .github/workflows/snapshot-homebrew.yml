name: Snapshot Homebrew

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  snapshot-homebrew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Read unreleased version from CHANGELOG.md
        run: |
          VERSION="$(sed -n 's/^## \[\([^]]\+\)\].*/\1/p' CHANGELOG.md | head -n 1)"
          if [ -z "${VERSION}" ]; then
            echo "Could not read version from CHANGELOG.md"
            exit 1
          fi
          echo "CHANGELOG_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Run GoReleaser (tip release + tip cask)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser-tip.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ env.CHANGELOG_VERSION }}-tip.${{ github.run_number }}.${{ github.run_attempt }}
